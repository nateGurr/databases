services:
  # Databases
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - 27017:27017
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j
    ports:
      - 7474:7474
      - 7687:7687
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data

  elasticsearch:
    image: elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - 9200:9200
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  # Admin UIs
  adminer:
    image: adminer
    ports:
      - 8080:8080
    depends_on:
      - postgres

  mongo-express:
    image: mongo-express
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
    depends_on:
      - mongo

  redisinsight:
    image: redis/redisinsight
    ports:
      - 5540:5540
    depends_on:
      - redis

  elasticvue:
    image: cars10/elasticvue
    ports:
      - 8082:8080
    depends_on:
      - elasticsearch

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  neo4j_data:
  elasticsearch_data: