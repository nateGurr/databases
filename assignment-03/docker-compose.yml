services:
  db:
    image: postgres:16-alpine
    container_name: shopflow_db
    environment:
      POSTGRES_USER: shopflow_admin
      POSTGRES_PASSWORD: shopflow_secure_2024
      POSTGRES_DB: shopflow_db
    ports:
      - "5432:5432"
    volumes:
      - shopflow_data:/var/lib/postgresql/data
      - .:/app:rw
      - ./base:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopflow_admin -d shopflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: shopflow_adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  shopflow_data:

# Usage:
#   docker-compose up -d          # Start containers
#   docker-compose down           # Stop containers
#   docker-compose down -v        # Stop and remove volumes (reset data)
#
# Database Connection:
#   Host: localhost (or db from within Docker network)
#   Port: 5432
#   Database: shopflow_db
#   User: shopflow_admin
#   Password: shopflow_secure_2024
#
# Adminer Web UI:
#   http://localhost:8080
