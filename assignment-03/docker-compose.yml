services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - .:/app:rw
      - ./base:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Verification service - run with: docker-compose run --rm verify
  verify:
    image: postgres:16-alpine
    container_name: verify
    volumes:
      - ./sql:/sql:ro
      - ./base:/base:ro
      - ./verify.sh:/verify.sh:ro
    environment:
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/verify.sh"]
    profiles:
      - tools

volumes:
  postgres_data:

# Usage:
#   docker-compose up -d              # Start database and adminer
#   docker-compose run --rm verify    # Run verification tests
#   docker-compose down               # Stop containers
#   docker-compose down -v            # Stop and remove volumes (reset data)
#
# Database Connection:
#   Host: localhost (or postgres from within Docker network)
#   Port: 5432
#   Database: postgres
#   User: postgres
#   Password: postgres
#
# Adminer Web UI:
#   http://localhost:8080
