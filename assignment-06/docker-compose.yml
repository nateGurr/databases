services:
  pawcare-db:
    image: postgres:16-alpine
    container_name: pawcare-db
    environment:
      POSTGRES_USER: pawcare
      POSTGRES_PASSWORD: pawcare123
      POSTGRES_DB: pawcare
    ports:
      - "5432:5432"
    volumes:
      - pawcare-data:/var/lib/postgresql/data
      - .:/app:rw
      - ./base:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawcare -d pawcare"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: pawcare-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: pawcare-db
    depends_on:
      pawcare-db:
        condition: service_healthy

volumes:
  pawcare-data:
