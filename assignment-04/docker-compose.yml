services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - .:/app:rw
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # Verification service - run with: docker-compose run --rm verify
  verify:
    image: postgres:16-alpine
    container_name: verify
    volumes:
      - ./sql:/sql:ro
      - ./verify.sh:/verify.sh:ro
    environment:
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/verify.sh"]
    profiles:
      - tools

volumes:
  postgres_data:
