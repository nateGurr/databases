services:
  db:
    image: postgres:16-alpine
    container_name: precision_parts_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: precision_parts
    ports:
      - "5432:5432"
    volumes:
      - precision_parts_data:/var/lib/postgresql/data
      - .:/app:rw
      - ./base:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: precision_parts_adminer
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha-dark

volumes:
  precision_parts_data:
